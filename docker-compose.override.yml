services:

  test.sqlserver:
    container_name: grupoemitest-sqlserver
    restart: unless-stopped
    environment:
      - "SA_PASSWORD=${SA_PASSWORD}"
      - "ACCEPT_EULA=Y"
      - "MSSQL_PID=Express"
    ports:
      - "11433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - grupoemitest-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${SA_PASSWORD}' -Q 'SELECT 1' -No -b"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  test.api:
    container_name: grupoemitest-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - ConnectionStrings__SqlServer=Server=test.sqlserver,1433;Database=${DB_NAME};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - grupoemitest-network
    depends_on:
      test.sqlserver:
        condition: service_healthy
